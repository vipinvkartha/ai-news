<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI News — Daily</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --card-hover: #1f232c;
    --text: #e8eaed;
    --muted: #9aa0aa;
    --accent: #6ea8fe;
    --border: #272b34;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7f9; --card: #ffffff; --card-hover: #f0f2f5;
      --text: #1a1c20; --muted: #6b7280; --accent: #2563eb; --border: #e5e7eb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    max-width: 820px; margin: 0 auto; padding: 32px 20px 12px;
  }
  h1 { margin: 0 0 4px; font-size: 26px; }
  .sub { color: var(--muted); font-size: 14px; }
  .controls {
    max-width: 820px; margin: 0 auto; padding: 8px 20px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .chip {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 999px; padding: 5px 14px; font-size: 13px; cursor: pointer;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { max-width: 820px; margin: 0 auto; padding: 16px 20px 60px; }
  .item {
    display: block; text-decoration: none; color: inherit;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    transition: background .12s ease;
  }
  .item:hover { background: var(--card-hover); }
  .item .title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .meta { color: var(--muted); font-size: 13px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .rank { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 10px; }
  .src { color: var(--accent); }
  .pts::before { content: "▲ "; }
  .loading, .error { color: var(--muted); text-align: center; padding: 40px 0; }
  footer { max-width: 820px; margin: 0 auto; padding: 0 20px 40px; color: var(--muted); font-size: 12px; }
  a.foot { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>🤖 AI News — Daily</h1>
    <div class="sub" id="updated">Loading…</div>
  </header>
  <div class="controls" id="filters"></div>
  <main id="list"><div class="loading">Fetching latest stories…</div></main>
  <footer>
    Auto-generated daily. Ranked by engagement + recency.
    <a class="foot" href="data/latest.json">raw data</a>
  </footer>

<script>
const FILTERS = [
  { key: "all", label: "All" },
  { key: "news", label: "News" },
  { key: "hn", label: "Hacker News" },
  { key: "reddit", label: "Reddit" },
  { key: "paper", label: "Papers" },
];
let ITEMS = [];
let active = localStorage.getItem("ai-news-filter") || "all";

function timeAgo(iso) {
  if (!iso) return "";
  const h = (Date.now() - new Date(iso)) / 3.6e6;
  if (h < 1) return Math.max(1, Math.round(h * 60)) + "m ago";
  if (h < 24) return Math.round(h) + "h ago";
  return Math.round(h / 24) + "d ago";
}

function render() {
  const list = document.getElementById("list");
  const shown = ITEMS.filter(it => active === "all" || (it.tags || []).includes(active));
  if (!shown.length) { list.innerHTML = '<div class="loading">No stories.</div>'; return; }
  list.innerHTML = shown.map((it, i) => `
    <a class="item" href="${it.url}" target="_blank" rel="noopener">
      <div class="title"><span class="rank">${i + 1}.</span>${escapeHtml(it.title)}</div>
      <div class="meta">
        <span class="src">${escapeHtml(it.source)}</span>
        ${it.points ? `<span class="pts">${it.points}</span>` : ""}
        <span>${timeAgo(it.published_at)}</span>
      </div>
    </a>`).join("");
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderFilters() {
  document.getElementById("filters").innerHTML = FILTERS.map(f =>
    `<button class="chip ${f.key === active ? "active" : ""}" data-k="${f.key}">${f.label}</button>`
  ).join("");
  document.querySelectorAll(".chip").forEach(b =>
    b.onclick = () => { active = b.dataset.k; localStorage.setItem("ai-news-filter", active); renderFilters(); render(); });
}

fetch("data/latest.json?cb=" + Date.now())
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    ITEMS = data.items || [];
    document.getElementById("updated").textContent =
      `${data.count} stories · updated ${timeAgo(data.generated_at)}`;
    renderFilters();
    render();
  })
  .catch(err => {
    document.getElementById("list").innerHTML =
      '<div class="error">Could not load data/latest.json — run the fetcher first.</div>';
    console.error(err);
  });
</script>
</body>
</html>
